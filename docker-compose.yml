services:
  postgres:
    image: pgvector/pgvector:pg16   # Postgres 16 + the pgvector extension (Phase 3)
    container_name: jdmatch-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-jdmatch}
      POSTGRES_USER: ${DB_USER:-jdmatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jdmatch}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - jdmatch-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jdmatch} -d ${DB_NAME:-jdmatch}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jdmatch-pgdata:
