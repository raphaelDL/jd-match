spring:
  application:
    name: jd-match
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jdmatch}
    username: ${DB_USER:jdmatch}
    password: ${DB_PASSWORD:jdmatch}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  ai:
    mcp:
      server:
        name: jd-match
        version: 0.1.0
        protocol: STREAMABLE   # Streamable HTTP (served alongside the REST API)
        type: SYNC
        streamable-http:
          mcp-endpoint: /mcp

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-6
  max-tokens: 2048

server:
  port: 8080
