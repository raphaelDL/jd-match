spring:
  application:
    name: jd-match
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jdmatch}
    username: ${DB_USER:jdmatch}
    password: ${DB_PASSWORD:jdmatch}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  ai:
    model:
      embedding: transformers   # local ONNX all-MiniLM-L6-v2 (384d), no API key
    mcp:
      server:
        name: jd-match
        version: 0.1.0
        protocol: STREAMABLE   # Streamable HTTP (served alongside the REST API)
        type: SYNC
        streamable-http:
          mcp-endpoint: /mcp
    vectorstore:
      pgvector:
        initialize-schema: false   # Flyway owns the schema (V5__enable_pgvector.sql)
        dimensions: 384
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        table-name: vector_store

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-4-6
  max-tokens: 2048

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true   # exposes /actuator/health/{liveness,readiness}
      group:
        readiness:
          include: readinessState,db   # not ready until the DB is reachable

