spring:
  application:
    name: jd-match
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jdmatch}
    username: ${DB_USER:jdmatch}
    password: ${DB_PASSWORD:jdmatch}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

# Consumed once the Claude client is wired up (analysis slice).
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

server:
  port: 8080
